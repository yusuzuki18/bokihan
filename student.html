<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>簿記RPGバトル</title>

<style>

body{
font-family:sans-serif;
text-align:center;
background-image:url('example.jpg');
background-size:cover;
background-position:center;
color:white;
}

/* ドラクエ風ウィンドウ */
.window{
width:650px;
margin:20px auto;
background:black;
border:5px solid white;
padding:15px;
}

/* モンスター */
#monster{
width:220px;
transition:transform 0.1s;
}

/* ボタン */
button{
font-size:20px;
padding:10px;
margin:10px;
}

/* ダメージポップアップ */
.damage{
position:absolute;
font-size:40px;
color:red;
font-weight:bold;
animation:pop 1s forwards;
}

@keyframes pop{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-80px);opacity:0}
}

/* モンスター揺れ */
.shake{
animation:shake 0.4s;
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-10px)}
50%{transform:translateX(10px)}
75%{transform:translateX(-10px)}
100%{transform:translateX(0)}
}

/* クリア・ゲームオーバー画面 */
#resultScreen{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background-size:cover;
background-position:center;
z-index:100;
flex-direction:column;
justify-content:center;
align-items:center;
}

#resultBox{
background:rgba(0,0,0,0.75);
border:5px solid white;
padding:30px 50px;
font-size:24px;
line-height:2;
color:white;
text-shadow:2px 2px 4px black;
margin-top:40vh;
}

#resultBox h2{
font-size:36px;
margin-bottom:10px;
}

#retryBtn{
margin-top:20px;
font-size:22px;
padding:12px 30px;
cursor:pointer;
}

/* 攻撃フラッシュ */
.flash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
opacity:0.6;
animation:flash 0.3s forwards;
}

@keyframes flash{
0%{opacity:0.7}
100%{opacity:0}
}

</style>

</head>

<body>

<h1>BOKI HANTER</h1>

<div class="window">

data.json読み込み <input type="file" id="file">

<br><br>

クラス <input id="class">
番号 <input id="num">
氏名 <input id="name">

<br><br>

<button onclick="startGame()">ゲーム開始</button>

</div>

<!-- モンスター表示（黒枠なし） -->

<div id="battle" style="display:none">

<h2 id="monsterName"></h2>

<img id="monster">

<!-- 黒枠UI -->

<div class="window">

<p id="question"></p>

<div id="choices"></div>

<p>勇者HP <span id="playerHP">100</span></p>
<p>敵HP <span id="enemyHP">100</span></p>

<p id="message"></p>

<p>倒したモンスター <span id="kill">0</span></p>

</div>

</div>

<!-- クリア・ゲームオーバー画面 -->
<div id="resultScreen">
  <div id="resultBox">
    <h2 id="resultTitle"></h2>
    <div id="resultInfo"></div>
    <button id="retryBtn" onclick="location.reload()">もう一度プレイ</button>
  </div>
</div>

<script>

let data
let monsters=[]
let playerHP=100
let enemyHP=100
let current=0
let kills=0
let startTime
let busy=false   // 連打防止

document.getElementById("file").addEventListener("change",loadJSON)

function loadJSON(e){

let reader=new FileReader()

reader.onload=function(){
data=JSON.parse(reader.result)
alert("data.json読み込み成功")
}

reader.readAsText(e.target.files[0])

}

function startGame(){

if(!data){
alert("先にdata.jsonを読み込んでください")
return
}

playerHP=100
kills=0
current=0
startTime=Date.now()

if(data.mode=="slime")monsters=["slime"]
if(data.mode=="goblin")monsters=["goblin"]
if(data.mode=="dragon")monsters=["dragon"]
if(data.mode=="all")monsters=["slime","goblin","dragon"]

document.getElementById("battle").style.display="block"

nextMonster()

}

function nextMonster(){

let type=monsters[current]

enemyHP=data.hp[type]

document.getElementById("enemyHP").textContent=enemyHP

let img={
slime:"monster1.png",
goblin:"monster2.png",
dragon:"monster3.png"
}

document.getElementById("monster").src=img[type]
document.getElementById("monsterName").textContent=type

ask()

}

function random(a){
return a[Math.floor(Math.random()*a.length)]
}

function typeText(text){

let el=document.getElementById("message")
el.textContent=""
let i=0

let timer=setInterval(function(){

el.textContent+=text[i]
i++

if(i>=text.length)clearInterval(timer)

},30)

}

function ask(){

let type=monsters[current]
let q

if(type=="slime")q=random(data.slime)
if(type=="goblin")q=random(data.goblin)
if(type=="dragon")q=random(data.dragon)

document.getElementById("question").textContent=q[0]

let c=document.getElementById("choices")
c.innerHTML=""

if(type=="slime"){
btn("借方",q[1])
btn("貸方",q[1])
}

if(type=="goblin"){
["資産","負債","純資産","収益","費用"].forEach(x=>btn(x,q[1]))
}

if(type=="dragon"){

let choices=[q[1],q[2],q[3],q[4]]

choices.sort(()=>Math.random()-0.5)

choices.forEach(c=>btn(c,q[1]))

}

}

function btn(text,ans){

let b=document.createElement("button")
b.textContent=text
b.onclick=()=>answer(text==ans)
document.getElementById("choices").appendChild(b)

}

function damagePopup(value){

let d=document.createElement("div")
d.className="damage"
d.textContent=value

d.style.left=(window.innerWidth/2)+"px"
d.style.top=(window.innerHeight/2)+"px"

document.body.appendChild(d)

setTimeout(()=>d.remove(),1000)

}

function flash(){

let f=document.createElement("div")
f.className="flash"

document.body.appendChild(f)

setTimeout(()=>f.remove(),300)

}

function shakeMonster(){

let m=document.getElementById("monster")
m.classList.add("shake")

setTimeout(()=>m.classList.remove("shake"),400)

}

function answer(ok){

if(busy)return
busy=true

if(ok){

enemyHP-=40

typeText("モンスターに40ダメージ！")

damagePopup(40)

flash()

}else{

playerHP-=30

typeText("勇者は30ダメージを受けた！")

damagePopup(-30)

}

document.getElementById("playerHP").textContent=playerHP
document.getElementById("enemyHP").textContent=enemyHP

if(playerHP<=0){
showResult(false)
return
}

if(enemyHP<=0){

kills++
document.getElementById("kill").textContent=kills

current++

if(current>=monsters.length){

let t=((Date.now()-startTime)/1000).toFixed(1)

showResult(true,t)

return
}

setTimeout(nextMonster,800)
busy=false
return

}

setTimeout(function(){
busy=false
ask()
},800)

}

function showResult(isCleared, time){

let screen=document.getElementById("resultScreen")
let title=document.getElementById("resultTitle")
let info=document.getElementById("resultInfo")

let now=new Date()
let dateStr=now.getFullYear()+"/"+(now.getMonth()+1).toString().padStart(2,"0")+"/"+now.getDate().toString().padStart(2,"0")
let timeStr=now.getHours().toString().padStart(2,"0")+":"+now.getMinutes().toString().padStart(2,"0")+":"+now.getSeconds().toString().padStart(2,"0")

let cls=document.getElementById("class").value
let num=document.getElementById("num").value
let name=document.getElementById("name").value

if(isCleared){
screen.style.backgroundImage="url('clear.png')"
title.textContent="★ クリア！ ★"
info.innerHTML=
"タイム："+time+"秒<br>"+
"日付："+dateStr+"<br>"+
"時刻："+timeStr+"<br>"+
"クラス："+cls+"<br>"+
"番号："+num+"<br>"+
"氏名："+name+"<br>"+
"<br>📸 スクリーンショットを提出してください"
}else{
screen.style.backgroundImage="url('GameOver.png')"
title.textContent="GAME OVER"
info.innerHTML=
"日付："+dateStr+"<br>"+
"時刻："+timeStr+"<br>"+
"クラス："+cls+"<br>"+
"番号："+num+"<br>"+
"氏名："+name
}

screen.style.display="flex"

}

</script>

</body>
</html>
